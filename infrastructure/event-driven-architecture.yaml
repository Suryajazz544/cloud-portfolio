AWSTemplateFormatVersion: '2010-09-09'
Description: 'Event-Driven Architecture: S3 triggers Lambda to send SNS notifications, with an EC2 instance granted access to S3.'

Parameters:
  NotificationEmail:
    Type: String
    Description: Email address to receive SNS notifications when an object is uploaded to the S3 bucket.
    Default: 'suryaprakashmulugu@gmail.com'

  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64'
    Description: Automatically fetches the latest Amazon Linux 2023 AMI.

Resources:
  # ==========================================
  # 1. S3 Bucket
  # ==========================================
  DataBucket:
    Type: AWS::S3::Bucket
    DependsOn:
      - LambdaInvokePermission
    Properties:
      BucketName: !Sub 'event-driven-data-bucket-${AWS::AccountId}-${AWS::Region}'
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: 's3:ObjectCreated:*'
            Function: !GetAtt ProcessUploadLambda.Arn

  # ==========================================
  # 2. SNS Topic
  # ==========================================
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'UploadNotificationTopic-${AWS::StackName}'

  NotificationSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref NotificationEmail
      Protocol: email
      TopicArn: !Ref NotificationTopic

  # ==========================================
  # 3. Lambda Function & IAM Role
  # ==========================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3AndSNSPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:::event-driven-data-bucket-${AWS::AccountId}-${AWS::Region}/*'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref NotificationTopic

  ProcessUploadLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ProcessUpload-${AWS::StackName}'
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 10
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref NotificationTopic
      Code:
        ZipFile: |
          import json
          import os
          import boto3

          sns_client = boto3.client('sns')

          def lambda_handler(event, context):
              sns_topic_arn = os.environ['SNS_TOPIC_ARN']
              
              for record in event['Records']:
                  bucket_name = record['s3']['bucket']['name']
                  object_key = record['s3']['object']['key']
                  
                  message = f"Success! A new object '{object_key}' was uploaded to bucket '{bucket_name}'."
                  print(message)
                  
                  # Publish to SNS
                  response = sns_client.publish(
                      TopicArn=sns_topic_arn,
                      Message=message,
                      Subject='New S3 Object Created'
                  )
                  print("SNS Publish Response:", response)

              return {
                  'statusCode': 200,
                  'body': json.dumps('Successfully processed S3 event and sent notification.')
              }

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ProcessUploadLambda.Arn
      Action: 'lambda:InvokeFunction'
      Principal: s3.amazonaws.com
      SourceAccount: !Ref 'AWS::AccountId'
      SourceArn: !Sub 'arn:aws:s3:::event-driven-data-bucket-${AWS::AccountId}-${AWS::Region}'

  # ==========================================
  # 4. EC2 Instance & IAM Role
  # ==========================================
  EC2S3AccessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EC2S3ReadWriteAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource: 
                  - !Sub 'arn:aws:s3:::event-driven-data-bucket-${AWS::AccountId}-${AWS::Region}'
                  - !Sub 'arn:aws:s3:::event-driven-data-bucket-${AWS::AccountId}-${AWS::Region}/*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2S3AccessRole

  ApplicationInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: !Ref LatestAmiId
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: !Sub 'S3-App-Server-${AWS::StackName}'

Outputs:
  S3BucketName:
    Description: Name of the newly created S3 bucket.
    Value: !Ref DataBucket

  LambdaFunctionName:
    Description: The name of the Lambda function processing S3 events.
    Value: !Ref ProcessUploadLambda

  EC2InstanceId:
    Description: The ID of the EC2 instance with S3 access.
    Value: !Ref ApplicationInstance
